services:
  db:
    image: postgres:18
    container_name: container-pgsql
    # ports:
    #   - 5432:5432
    volumes:
      - db:/var/lib/postgresql
    environment:
      POSTGRES_USER: 'user'
      POSTGRES_PASSWORD: 'postgres'
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1"]
      interval: 3s
      timeout: 3s
      retries: 3

  nicegui:
    image: image-nicegui
    # restart: always
    build:
      context: ./nicegui
    container_name: container-nicegui
    depends_on:
      db:
        condition: service_healthy
    ports:
      - 8888:8080
    working_dir: "/app"
    volumes:
      - ./nicegui:/app
    command: python /app/main.py

volumes:
  db:
