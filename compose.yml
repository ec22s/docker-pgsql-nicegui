services:
  db:
    image: postgres:18
    container_name: container-pgsql
    # ports:
    #   - 5432:5432
    volumes:
      - db:/var/lib/postgresql
    environment:
      POSTGRES_USER: 'user'
      POSTGRES_PASSWORD: 'postgres'

  nicegui:
    image: image-nicegui
    # restart: always
    build:
      context: ./nicegui
    container_name: container-nicegui
    depends_on:
      - db
    ports:
      - 8888:8080
    working_dir: "/app"
    volumes:
      - ./nicegui:/app
    command: python /app/main.py

volumes:
  db:
